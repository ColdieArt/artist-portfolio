<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Render — Tech Epochalypse</title>
  <link rel="stylesheet" href="print-render.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>PRINT RENDER</h1>
      <span class="subtitle">Tech Epochalypse</span>
    </header>

    <div class="controls">
      <div class="control-row">
        <label for="overlord-select">Overlord</label>
        <select id="overlord-select">
          <option value="elon-musk">Elon Musk</option>
          <option value="mark-zuckerberg">Mark Zuckerberg</option>
          <option value="sam-altman">Sam Altman</option>
          <option value="jeff-bezos">Jeff Bezos</option>
          <option value="jensen-huang">Jensen Huang</option>
          <option value="combined">The Collective</option>
        </select>
      </div>

      <div class="control-row">
        <label for="json-input">Composition</label>
        <div class="file-input-wrapper">
          <button id="json-btn" type="button">Choose File</button>
          <input type="file" id="json-input" accept=".json" />
          <span id="json-filename">No file selected</span>
        </div>
      </div>

      <div class="control-row">
        <label for="size-select">Print Size</label>
        <select id="size-select">
          <option value="1500x2100">5×7 at 300 DPI</option>
          <option value="2400x3000" selected>8×10 at 300 DPI</option>
          <option value="3300x4200">11×14 at 300 DPI</option>
          <option value="4800x6000">16×20 at 300 DPI</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="control-row" id="custom-size-row" style="display:none;">
        <label>Custom Size</label>
        <div class="custom-inputs">
          <input type="number" id="custom-width" placeholder="Width" value="3000" min="100" max="8000" />
          <span>×</span>
          <input type="number" id="custom-height" placeholder="Height" value="4000" min="100" max="8000" />
          <span>px</span>
        </div>
      </div>

      <div class="control-row">
        <label>Orientation</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="orientation" value="portrait" checked />
            Portrait
          </label>
          <label class="radio-label">
            <input type="radio" name="orientation" value="landscape" />
            Landscape
          </label>
        </div>
      </div>

      <div class="control-row resolution-display">
        <label>Resolution</label>
        <span id="resolution-text">2400 × 3000 px</span>
      </div>

      <div class="button-row">
        <button id="render-btn" type="button" disabled>RENDER</button>
        <button id="download-btn" type="button" disabled>DOWNLOAD PNG</button>
      </div>

      <div id="warning" class="warning" style="display:none;">
        Large renders may fail on some devices. If the render is blank, try a smaller resolution.
      </div>
    </div>

    <div id="preview-container">
      <div id="preview-placeholder">
        Upload a composition JSON and click Render to preview
      </div>
      <canvas id="preview-canvas" style="display:none;"></canvas>
    </div>

    <div id="status">Ready</div>
  </div>

  <!-- The artwork loads in this hidden iframe -->
  <iframe id="artwork-frame" style="position:absolute;left:-99999px;top:0;width:1px;height:1px;border:none;"></iframe>

  <script src="print-render.js"></script>
</body>
</html>
