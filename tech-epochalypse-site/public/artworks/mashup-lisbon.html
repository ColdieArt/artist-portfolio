// ── MASK SYSTEM ──

function drawMaskShape(ctx, shape, cx, cy, radius) {
    ctx.beginPath();
    switch (shape) {
        case 'square':
            ctx.rect(cx - radius, cy - radius, radius * 2, radius * 2);
            break;
        case 'circle':
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            break;
        case 'triangle': {
            const h = radius * Math.sqrt(3);
            ctx.moveTo(cx, cy - radius);
            ctx.lineTo(cx + h / 2, cy + radius / 2);
            ctx.lineTo(cx - h / 2, cy + radius / 2);
            ctx.closePath();
            break;
        }
        case 'star': {
            const spikes = 5;
            const outerR = radius;
            const innerR = radius * 0.4;
            for (let i = 0; i < spikes * 2; i++) {
                const r = i % 2 === 0 ? outerR : innerR;
                const angle = (Math.PI / 2 * -1) + (i * Math.PI / spikes);
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            break;
        }
    }
}

function createMaskPreviewTexture(shape, scale, imgW, imgH, offX, offY) {
    const canvas = document.createElement('canvas');
    canvas.width = imgW;
    canvas.height = imgH;
    const ctx = canvas.getContext('2d');

    // Semi-transparent dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, imgW, imgH);

    // Cut out the shape (clear it so image shows through)
    const minDim = Math.min(imgW, imgH);
    const radius = (minDim / 2) * scale;
    const cx = imgW / 2 + offX * imgW;
    const cy = imgH / 2 - offY * imgH; // flip Y

    ctx.globalCompositeOperation = 'destination-out';
    drawMaskShape(ctx, shape, cx, cy, radius);
    ctx.fill();

    // Draw shape outline
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.lineWidth = Math.max(1, minDim * 0.003);
    drawMaskShape(ctx, shape, cx, cy, radius);
    ctx.stroke();

    const tex = new THREE.Texture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;
    return tex;
}

function initMaskDrawCanvas() {
    if (!maskTargetMesh || !maskTargetMesh.material.map) return;
    const img = maskTargetMesh.material.map.image;
    maskDrawCanvas = document.createElement('canvas');
    maskDrawCanvas.width = img.width;
    maskDrawCanvas.height = img.height;
    maskDrawCtx = maskDrawCanvas.getContext('2d');
    // Start fully transparent (nothing visible) — user draws opaque white to reveal
    maskDrawCtx.clearRect(0, 0, maskDrawCanvas.width, maskDrawCanvas.height);
    maskDrawLastUV = null;
}

function paintOnMaskCanvas(u, v) {
    if (!maskDrawCanvas || !maskDrawCtx) return;
    const w = maskDrawCanvas.width;
    const h = maskDrawCanvas.height;
    // UV to pixel: u goes left-to-right, v goes bottom-to-top in Three.js
    const px = u * w;
    const py = (1 - v) * h;
    const minDim = Math.min(w, h);
    const brushRadius = (minDim / 2) * maskScale * 0.3; // Scale brush relative to image

    maskDrawCtx.globalCompositeOperation = 'source-over';
    maskDrawCtx.fillStyle = 'white';
    maskDrawCtx.beginPath();

    // If we have a previous point, draw a line of circles for smooth strokes
    if (maskDrawLastUV) {
        const prevPx = maskDrawLastUV.u * w;
        const prevPy = (1 - maskDrawLastUV.v) * h;
        const dist = Math.sqrt((px - prevPx) ** 2 + (py - prevPy) ** 2);
        const steps = Math.max(1, Math.ceil(dist / (brushRadius * 0.5)));
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const cx = prevPx + (px - prevPx) * t;
            const cy = prevPy + (py - prevPy) * t;
            maskDrawCtx.moveTo(cx + brushRadius, cy);
            maskDrawCtx.arc(cx, cy, brushRadius, 0, Math.PI * 2);
        }
    } else {
        maskDrawCtx.arc(px, py, brushRadius, 0, Math.PI * 2);
    }
    maskDrawCtx.fill();
    maskDrawLastUV = { u, v };
}

function createDrawMaskPreviewTexture() {
    if (!maskTargetMesh || !maskDrawCanvas) return null;
    const img = maskTargetMesh.material.map.image;
    const w = img.width;
    const h = img.height;

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Dark overlay everywhere
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, w, h);

    // Cut out the drawn areas (where mask canvas is opaque white)
    ctx.globalCompositeOperation = 'destination-out';
    ctx.drawImage(maskDrawCanvas, 0, 0);

    const tex = new THREE.Texture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = false;
    tex.needsUpdate = true;
    return tex;
}

function enterMaskMode(mesh) {
    maskMode = true;
    maskTargetMesh = mesh;
    maskOffsetX = 0;
    maskOffsetY = 0;
    maskScale = parseInt(document.getElementById('mask-panel').querySelector('input[type="range"]').value) / 100;

    const btn = document.getElementById('mask-btn');
    btn.textContent = 'MASK ON';
    btn.style.borderColor = '#4CAF50';

            arrowContainer.style.top = `${leftUiContainer.offsetHeight + 10}px`;
        }, 10);
    }

    updateMaskOverlay();
}

function exitMaskMode() {
    maskMode = false;
    maskTargetMesh = null;
    maskDrawCanvas = null;
    maskDrawCtx = null;
    maskDrawing = false;
    maskDrawLastUV = null;

    const btn = document.getElementById('mask-btn');
    btn.textContent = 'MASK';
    btn.style.borderColor = 'white';

    document.getElementById('mask-panel').style.display = 'none';

    // Remove overlay
    if (maskOverlayMesh) {
        scene.remove(maskOverlayMesh);
        if (maskOverlayMesh.geometry) maskOverlayMesh.geometry.dispose();
        if (maskOverlayMesh.material) {
            if (maskOverlayMesh.material.map) maskOverlayMesh.material.map.dispose();
            maskOverlayMesh.material.dispose();
        }
        maskOverlayMesh = null;
    }

    // Recalculate arrow position
    if (leftUiContainer.style.top === '10px' && arrowContainer) {
        setTimeout(() => {
            arrowContainer.style.top = `${leftUiContainer.offsetHeight + 10}px`;
        }, 10);
    }
}

function updateMaskOverlay() {
    if (!maskTargetMesh) return;

    const img = maskTargetMesh.material.map.image;
    const tex = (maskShape === 'draw')
        ? createDrawMaskPreviewTexture()
        : createMaskPreviewTexture(maskShape, maskScale, img.width, img.height, maskOffsetX, maskOffsetY);
    if (!tex) return;

    if (maskOverlayMesh) {
        // Update existing overlay
        if (maskOverlayMesh.material.map) maskOverlayMesh.material.map.dispose();
        maskOverlayMesh.material.map = tex;
        maskOverlayMesh.material.needsUpdate = true;

        // Match target geometry size
        const userScale = maskTargetMesh.userData.userScale || 1;
        const baseW = maskTargetMesh.userData.initialScale.width * userScale;
        const baseH = maskTargetMesh.userData.initialScale.height * userScale;
        maskOverlayMesh.geometry.dispose();
        maskOverlayMesh.geometry = new THREE.PlaneGeometry(baseW, baseH);
        maskOverlayMesh.position.copy(maskTargetMesh.position);
        maskOverlayMesh.position.z += 0.01; // Slightly in front
        maskOverlayMesh.rotation.copy(maskTargetMesh.rotation);
    } else {
        // Create new overlay
        const userScale = maskTargetMesh.userData.userScale || 1;
        const baseW = maskTargetMesh.userData.initialScale.width * userScale;
        const baseH = maskTargetMesh.userData.initialScale.height * userScale;
        const geom = new THREE.PlaneGeometry(baseW, baseH);
        const mat = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        maskOverlayMesh = new THREE.Mesh(geom, mat);
        maskOverlayMesh.position.copy(maskTargetMesh.position);
        maskOverlayMesh.position.z += 0.01;
        maskOverlayMesh.rotation.copy(maskTargetMesh.rotation);
        maskOverlayMesh.userData.isMaskOverlay = true;
        scene.add(maskOverlayMesh);
    }
}

function applyMask() {
    if (!maskTargetMesh || !maskTargetMesh.material.map) return;

    const srcImg = maskTargetMesh.material.map.image;
    const w = srcImg.width;
    const h = srcImg.height;

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Draw original image
    ctx.drawImage(srcImg, 0, 0);

    if (maskShape === 'draw' && maskDrawCanvas) {
        // Use the freehand draw canvas as the mask
        ctx.globalCompositeOperation = 'destination-in';
        ctx.drawImage(maskDrawCanvas, 0, 0);
    } else {
        // Apply mask — only keep pixels inside the shape
        const minDim = Math.min(w, h);
        const radius = (minDim / 2) * maskScale;
        const cx = w / 2 + maskOffsetX * w;
        const cy = h / 2 - maskOffsetY * h;

        // Create mask canvas
        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = w;
        maskCanvas.height = h;
        const mctx = maskCanvas.getContext('2d');

        // Fill shape in white on mask canvas
        mctx.fillStyle = 'white';
        drawMaskShape(mctx, maskShape, cx, cy, radius);
        mctx.fill();

        // Use mask to clip the image
        ctx.globalCompositeOperation = 'destination-in';
        ctx.drawImage(maskCanvas, 0, 0);
    }

    // Create new texture from masked result
    const newTex = new THREE.Texture(canvas);
    newTex.colorSpace = THREE.SRGBColorSpace;
    newTex.minFilter = THREE.LinearFilter;
    newTex.magFilter = THREE.LinearFilter;
    newTex.generateMipmaps = false;
    if (renderer) newTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    newTex.needsUpdate = true;

    // Replace texture on mesh
    if (maskTargetMesh.material.map) maskTargetMesh.material.map.dispose();
    maskTargetMesh.material.map = newTex;
    maskTargetMesh.material.transparent = true;
    maskTargetMesh.material.alphaTest = 0.01; // Discard fully transparent fragments (no color or depth write)
    maskTargetMesh.material.depthWrite = true; // Visible pixels write depth normally
    maskTargetMesh.material.needsUpdate = true;

    // Clear alpha cache for this texture so clicks work correctly
    if (typeof textureAlphaCanvasCache !== 'undefined') {
        textureAlphaCanvasCache.delete(maskTargetMesh.material.map.id);
    }

    exitMaskMode();
}

function initElementControls() {
    const panel = document.getElementById('element-controls');
    const scaleSlider = document.getElementById('scale-slider');
    const rotateX = document.getElementById('rotate-x');
    const rotateY = document.getElementById('rotate-y');
    const rotateZ = document.getElementById('rotate-z');
    if (!panel) return;

    // Scale slider
    scaleSlider.addEventListener('input', () => {
        if (!selectedScaleElement) return;
        const pct = parseInt(scaleSlider.value);
        const scale = pct / 100;
        selectedScaleElement.userData.userScale = scale;
        const baseW = selectedScaleElement.userData.initialScale.width;
        const baseH = selectedScaleElement.userData.initialScale.height;
        selectedScaleElement.geometry.dispose();
        selectedScaleElement.geometry = new THREE.PlaneGeometry(baseW * scale, baseH * scale);
        document.getElementById('scale-value').textContent = pct + '%';
    });

    // Rotation sliders
    const applyRotation = () => {
        if (!selectedScaleElement) return;
        const rx = parseInt(rotateX.value);
        const ry = parseInt(rotateY.value);
        const rz = parseInt(rotateZ.value);
        selectedScaleElement.rotation.set(
            THREE.MathUtils.degToRad(rx),
            THREE.MathUtils.degToRad(ry),
            THREE.MathUtils.degToRad(rz)
        );
        document.getElementById('rotate-x-value').textContent = rx + '°';
        document.getElementById('rotate-y-value').textContent = ry + '°';
        document.getElementById('rotate-z-value').textContent = rz + '°';
    };
    rotateX.addEventListener('input', applyRotation);
    rotateY.addEventListener('input', applyRotation);
    rotateZ.addEventListener('input', applyRotation);

    // Prevent interaction from propagating to scene
    panel.addEventListener('mousedown', (e) => e.stopPropagation());
    panel.addEventListener('touchstart', (e) => e.stopPropagation());
    panel.addEventListener('click', (e) => e.stopPropagation());
}

function selectElementForControls(mesh) {
    if (!mesh || !mesh.userData.id) return;
    selectedScaleElement = mesh;

    const panel = document.getElementById('element-controls');
    const scaleSlider = document.getElementById('scale-slider');
    const rotateX = document.getElementById('rotate-x');
    const rotateY = document.getElementById('rotate-y');
    const rotateZ = document.getElementById('rotate-z');

    if (!panel) return;

    // Position element-controls to the right of the left UI with 20px padding
    const leftUI = document.getElementById('left-ui-container');
    if (leftUI && leftUI.style.top === '10px') {
        panel.style.left = (leftUI.offsetLeft + leftUI.offsetWidth + 20) + 'px';
    } else {
        panel.style.left = '10px';
    }

    // Update element name
    const displayName = mesh.userData.id.replace(/([A-Z])/g, ' $1').toUpperCase().trim();
    document.getElementById('ctrl-element-name').textContent = displayName;

    // Update scale slider
    const currentScale = Math.round((mesh.userData.userScale || 1.0) * 100);
    scaleSlider.value = currentScale;
    document.getElementById('scale-value').textContent = currentScale + '%';

    const ry = Math.round(THREE.MathUtils.radToDeg(mesh.rotation.y));

    rotateY.value = ry;
    rotateZ.value = rz;
    document.getElementById('rotate-x-value').textContent = rx + '°';
    document.getElementById('rotate-y-value').textContent = ry + '°';

function updateElementIndicator(elementId) {
    const indicator = document.getElementById('eye-indicator');
    if (indicator) {
        const idx = elementOverlordIndex[elementId];
        const label = elementId.replace(/([A-Z])/g, ' $1').toUpperCase().trim();
        const isBranded = ['spacex', 'blueBill', 'rocket'].includes(elementId);

        if (isBranded) {
            indicator.innerHTML = `<span style="color:#fff;font-size:12px;">${BRANDED_LABELS[idx] || label}</span>`;
        } else {
            indicator.innerHTML = `<span style="color:#fff;font-size:12px;">${label}: ${OVERLORD_NUMERALS[idx]}</span><br><span style="font-size:9px;color:#555;">${OVERLORD_NAMES[idx].toUpperCase()}</span>`;
        }

        // Flash the indicator briefly
        indicator.style.opacity = '1';
        setTimeout(() => { indicator.style.opacity = '0.6'; }, 1500);
    }
}

// Swap mode is handled inside onClick — no separate handler needed
function onRightClickEyeCycle() { /* deprecated — swap mode uses onClick */ }

function cycleElement(elementId) {
    const urls = OVERLORD_ASSETS[elementId];
    if (!urls) return;

    const totalOptions = urls.length;

    // Find next option that has an asset for this element
    let nextIdx = elementOverlordIndex[elementId];
    let attempts = 0;
    do {
        nextIdx = (nextIdx + 1) % totalOptions;
        attempts++;
    } while (!urls[nextIdx] && attempts < totalOptions);

    if (attempts >= totalOptions) return; // No assets available

    elementOverlordIndex[elementId] = nextIdx;

    // Eyes cycle independently; mouth has overlay companion for Altman
    if (elementId === 'rightEye') {
        cycleRightEyeMesh(nextIdx);
    } else if (elementId === 'leftEye') {
        cycleLeftEyeMesh(nextIdx);
    } else if (elementId === 'mouth') {
        cycleGenericElement(elementId, nextIdx);
        cycleMouthOverlay(nextIdx);
    } else {
        // Generic element cycling
        cycleGenericElement(elementId, nextIdx);
    }

    updateElementIndicator(elementId);

    // Log label: use branded labels or overlord names depending on element type
    const isBranded = ['spacex', 'blueBill', 'rocket'].includes(elementId);
    const logLabel = isBranded ? (BRANDED_LABELS[nextIdx] || nextIdx) : `${OVERLORD_NAMES[nextIdx]} (${OVERLORD_NUMERALS[nextIdx]})`;
    console.log(`${elementId} cycled to: ${logLabel}`);
}

function cycleRightEyeMesh(overlordIdx) {
    const rightTex = preloadedElementTextures['rightEye'] ? preloadedElementTextures['rightEye'][overlordIdx] : null;
    if (rightEyeMesh && rightTex) {
        swapMeshTexture(rightEyeMesh, rightTex);
    }
}

function cycleLeftEyeMesh(overlordIdx) {
    const leftTex = preloadedElementTextures['leftEye'] ? preloadedElementTextures['leftEye'][overlordIdx] : null;
    if (leftEyeMesh && leftTex) {
        swapMeshTexture(leftEyeMesh, leftTex);
    }
}

let mouthOverlayMesh = null; // Altman's second mouth piece overlay

function cycleMouthOverlay(overlordIdx) {
    const ALTMAN_IDX = 2;
    if (overlordIdx === ALTMAN_IDX) {
        // Show Altman's overlay mouth
        const overlayTex = preloadedElementTextures['mouthOverlay'] ? preloadedElementTextures['mouthOverlay'][ALTMAN_IDX] : null;
        if (!mouthOverlayMesh && overlayTex) {
            const baseScale = 0.005;
            const material = new THREE.MeshBasicMaterial({
                map: overlayTex, transparent: true, side: THREE.DoubleSide,
                alphaTest: 0.5, blending: THREE.MultiplyBlending
            });
            const planeWidth = overlayTex.image.width * baseScale;
            const planeHeight = overlayTex.image.height * baseScale;
            const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
            mouthOverlayMesh = new THREE.Mesh(geometry, material);
            // Position at same place as mouth, slightly in front
            const mouthMesh = draggableObjects.find(obj => obj.userData.id === 'mouth');
            const mY = mouthMesh ? mouthMesh.position.y : -1.5;
            const mZ = mouthMesh ? mouthMesh.position.z + 0.01 : (10 - 1) * 0.2;
            mouthOverlayMesh.position.set(0, mY, mZ);
            mouthOverlayMesh.userData.id = 'mouthOverlay';
            mouthOverlayMesh.userData.currentLayer = mouthMesh ? mouthMesh.userData.currentLayer + 1 : 10;
            mouthOverlayMesh.userData.initialPosition = mouthOverlayMesh.position.clone();
            mouthOverlayMesh.userData.initialLayer = mouthOverlayMesh.userData.currentLayer;
            mouthOverlayMesh.userData.initialScale = { width: planeWidth, height: planeHeight };
            scene.add(mouthOverlayMesh);
            draggableObjects.push(mouthOverlayMesh);
        } else if (mouthOverlayMesh) {
            fadeInMesh(mouthOverlayMesh);
        }
    } else {
        // Hide overlay for non-Altman overlords
        if (mouthOverlayMesh) fadeOutMesh(mouthOverlayMesh);
    }
}

function cycleGenericElement(elementId, overlordIdx) {
    const textures = preloadedElementTextures[elementId];
    if (!textures) return;
    const newTex = textures[overlordIdx];

    // Find the mesh with this userData.id
    let mesh = null;
    if (elementId === 'background') {
        mesh = backgroundMesh;
    } else {
        mesh = draggableObjects.find(obj => obj.userData.id === elementId);
    }

    if (!mesh) return;

    if (!newTex) {
        // No asset for this overlord - hide the element
        fadeOutMesh(mesh);
        return;
    }

    // Element was previously hidden - show it
    if (!mesh.visible) {
        mesh.visible = true;
    }

    swapMeshTexture(mesh, newTex);
}

function swapMeshTexture(mesh, newTexture) {
    if (!mesh || !newTexture) return;
    const baseScale = 0.005;

    // Ensure mesh is visible (may have been hidden by fadeOutMesh)
    mesh.visible = true;

    // Fade out, swap, fade in
    mesh.material.transparent = true;
    mesh.material.opacity = 0;
    mesh.material.map = newTexture;
    mesh.material.needsUpdate = true;

    // Rebuild geometry to match new texture dimensions
    const newWidth = newTexture.image.width * baseScale;
    const newHeight = newTexture.image.height * baseScale;

    // Base dimensions (before user scale) for the new texture
    const swapFactor = mesh.userData.swapScaleFactor || 1.0;
    const baseW = newWidth * swapFactor;
    const baseH = newHeight * swapFactor;

    // Update initialScale so scale slider maintains correct 1:1 ratio
    mesh.userData.initialScale = { width: baseW, height: baseH };

    // Apply user scale from slider on top of base dimensions
    const userScale = mesh.userData.userScale || 1.0;

    mesh.geometry.dispose();
    mesh.geometry = new THREE.PlaneGeometry(baseW * userScale, baseH * userScale);

    // Animate opacity back in
    animateOpacity(mesh, 0, 1, 200);
}

function fadeOutMesh(mesh) {
    if (!mesh) return;
    mesh.material.transparent = true;
    animateOpacity(mesh, mesh.material.opacity, 0, 150, () => {
        mesh.visible = false;
    });
}

function fadeInMesh(mesh) {
    if (!mesh) return;
    mesh.visible = true;
    mesh.material.transparent = true;
    animateOpacity(mesh, 0, 1, 200);
}

function animateOpacity(mesh, from, to, durationMs, onComplete) {
    const startTime = performance.now();
    function step(time) {
        const elapsed = time - startTime;
        const t = Math.min(elapsed / durationMs, 1);
        mesh.material.opacity = from + (to - from) * t;
        mesh.material.needsUpdate = true;
        if (t < 1) {
            requestAnimationFrame(step);
        } else if (onComplete) {
            onComplete();
        }
    }
    requestAnimationFrame(step);
}

// ══════════════════════════════════════════════════════════════

function onPointerDown(event) {

    isDragging = false;
    pointerDownPosition.set(event.clientX, event.clientY);

    // Check if the click is on a UI element
    if (event.target.closest('#left-ui-container') || event.target.closest('#right-ui-container') || event.target.closest('#arrow-container') || event.target.closest('#element-controls')) {
        selectedObject = null;
        controls.enabled = true;
        return;
    }

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // In mask mode, intercept clicks for drawing or shape dragging
    if (maskMode && maskTargetMesh) {
        if (maskShape === 'draw') {
            // Raycast against the target mesh to get UV for drawing
            const drawHits = raycaster.intersectObject(maskTargetMesh);
            if (drawHits.length > 0 && drawHits[0].uv) {
                maskDrawing = true;
                maskDrawLastUV = null;
                controls.enabled = false;
                paintOnMaskCanvas(drawHits[0].uv.x, drawHits[0].uv.y);
                updateMaskOverlay();
                return;
            }
        } else if (maskOverlayMesh) {
            const maskHits = raycaster.intersectObject(maskOverlayMesh);
            if (maskHits.length > 0) {
                maskDragging = true;
                maskDragStart = { x: event.clientX, y: event.clientY, offX: maskOffsetX, offY: maskOffsetY };
                controls.enabled = false;
                return;
            }
        }
    }

    const intersects = raycaster.intersectObjects(draggableObjects, true); // Intersect with all descendants

    // Filter intersects to only consider those with alpha > 0.1
    for (const intersect of intersects) {
        const object = intersect.object;
        const material = object.material;

        // Ensure the material has a map property before trying to access its alpha
        if (material && material.map && material.transparent) {
            const uv = intersect.uv;
            const alpha = getAlphaAtUV(material.map, uv);

            if (alpha > 0.1) { // Alpha threshold for drag detection
                selectedObject = object;
                controls.enabled = false;
                initialObjectZ = selectedObject.position.z;
                offset.copy(intersect.point).sub(selectedObject.position);
                break; // Found a draggable opaque part, stop searching
            }
        } else if (material && material.alphaTest !== undefined && material.alphaTest > 0) {
            // For ShaderMaterial with alphaTest, treat as always opaque if intersect occurs
            selectedObject = object;
            controls.enabled = false;
            initialObjectZ = selectedObject.position.z;
            offset.copy(intersect.point).sub(selectedObject.position);
            break; // Found a draggable opaque part, stop searching
        } else if (material && !material.transparent) {
            // For opaque materials, any intersect means it's draggable
            selectedObject = object;
            controls.enabled = false;
            initialObjectZ = selectedObject.position.z;
            offset.copy(intersect.point).sub(selectedObject.position);
            break; // Found a draggable opaque part, stop searching
        }
    }
}

function onPointerMove(event) {

    // Handle freehand draw mask painting
    if (maskDrawing && maskShape === 'draw' && maskTargetMesh) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const drawHits = raycaster.intersectObject(maskTargetMesh);
        if (drawHits.length > 0 && drawHits[0].uv) {
            paintOnMaskCanvas(drawHits[0].uv.x, drawHits[0].uv.y);
            updateMaskOverlay();
        }
        return;
    }

    // Handle mask overlay dragging
    if (maskDragging && maskDragStart && maskTargetMesh) {
        const dx = (event.clientX - maskDragStart.x) / window.innerWidth;
        const dy = (event.clientY - maskDragStart.y) / window.innerHeight;
        maskOffsetX = maskDragStart.offX + dx * 2;
        maskOffsetY = maskDragStart.offY - dy * 2;
        // Clamp offsets
        maskOffsetX = Math.max(-0.5, Math.min(0.5, maskOffsetX));
        maskOffsetY = Math.max(-0.5, Math.min(0.5, maskOffsetY));
        updateMaskOverlay();
        return;
    }

    if (selectedObject) {
        // Check if the pointer has moved beyond the drag threshold
        const currentPointerPosition = new THREE.Vector2(event.clientX, event.clientY);
        if (currentPointerPosition.distanceTo(pointerDownPosition) > DRAG_THRESHOLD) {
            isDragging = true;
        }

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // Create a plane that is parallel to the camera's view plane
        // and passes through the object's initial Z-position.
        const plane = new THREE.Plane();
        plane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0, 0, initialObjectZ));

        const intersection = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(plane, intersection)) {
            // Update X and Y, but keep the original Z-position
            selectedObject.position.x = intersection.x - offset.x;
            selectedObject.position.y = intersection.y - offset.y;
            selectedObject.position.z = initialObjectZ;
            
            // If the object is the ear, update its initialPosition in userData so it doesn't snap back on resize until reset
            if (selectedObject.userData.id === 'ear') {
                 selectedObject.userData.initialPosition.copy(selectedObject.position);
                 // Also update the config for reset consistency
                 const earConfig = initialAssetConfigs.find(c => c.id === 'ear');
                 if (earConfig) earConfig.initialPosition.copy(selectedObject.position);
            }

            // Update redaction rectangle positions if the selected object is an eye
            if (selectedObject === rightEyeMesh) {
                if (rightEyeRedactionRect) {
                    rightEyeRedactionRect.position.x = selectedObject.position.x;
                    rightEyeRedactionRect.position.y = selectedObject.position.y;
                }
            } else if (selectedObject === leftEyeMesh) {
                if (leftEyeRedactionRect) {
                    leftEyeRedactionRect.position.x = selectedObject.position.x;
                    leftEyeRedactionRect.position.y = selectedObject.position.y;
                }
            }
        }
    }
}

function onPointerUp(event) {

    // Release mask draw painting
    if (maskDrawing) {
        maskDrawing = false;
        maskDrawLastUV = null;
        controls.enabled = true;
        return;
    }

    // Release mask dragging
    if (maskDragging) {
        maskDragging = false;
        maskDragStart = null;
        controls.enabled = true;
        return;
    }

    if (isDragging || event.target.closest('#trash-button')) { // Check if dragging or if pointer released directly over trash button
        // Check if the pointer was released over the TRASH button
        if (trashButtonElement) {
            const rect = trashButtonElement.getBoundingClientRect();

            // Define a larger target area for the trash button
            const expandedRect = {
                left: rect.left - 20, // 20 pixels extra padding on left
                right: rect.right + 20, // 20 pixels extra padding on right
                top: rect.top - 20, // 20 pixels extra padding on top
                bottom: rect.bottom + 20 // 20 pixels extra padding on bottom
            };

            if (event.clientX >= expandedRect.left && event.clientX <= expandedRect.right &&
                event.clientY >= expandedRect.top && event.clientY <= expandedRect.bottom) {

                if (selectedObject) {
                    // Mark the object as removed in the initialAssetConfigs for later reloading
                    const configIndex = initialAssetConfigs.findIndex(config => config.id === selectedObject.userData.id);
                    if (configIndex !== -1) {
                        initialAssetConfigs[configIndex].removed = true;
                    }

                    // Exit mask mode if trashing the masked target
                    if (maskMode && maskTargetMesh === selectedObject) exitMaskMode();

                    // Object was dropped onto the trash button, remove it
                    scene.remove(selectedObject);
                    // Remove from draggableObjects array
                    draggableObjects = draggableObjects.filter(obj => obj !== selectedObject);
                    // Remove from cameraAnimationTargets array
                    cameraAnimationTargets = cameraAnimationTargets.filter(obj => obj !== selectedObject);

                    // Dispose of geometry and material to free up memory
                    if (selectedObject.geometry) selectedObject.geometry.dispose();
                    if (selectedObject.material) {
                        if (Array.isArray(selectedObject.material)) {
                            selectedObject.material.forEach(m => m.dispose());
                        } else {
                            selectedObject.material.dispose();
                        }
                    }

                    // Special handling for specific removed objects (set global refs to null)
                    if (selectedObject.userData.id === 'dogecoin') {
                        dogecoinRef = null;
                    }
                    if (selectedObject.userData.id === 'spacex') {
                        spacexRef = null;
                    }
                    if (selectedObject.userData.id === 'rightEye') {
                        if (rightEyeRedactionRect) { scene.remove(rightEyeRedactionRect); rightEyeRedactionRect.geometry.dispose(); rightEyeRedactionRect.material.dispose(); }
                        rightEyeMesh = null;
                        rightEyeRedactionRect = null;
                    }
                    if (selectedObject.userData.id === 'leftEye') {
                        if (leftEyeRedactionRect) { scene.remove(leftEyeRedactionRect); leftEyeRedactionRect.geometry.dispose(); leftEyeRedactionRect.material.dispose(); }
                        leftEyeMesh = null;
                        leftEyeRedactionRect = null;
                    }
                    console.log("Object removed:", selectedObject.name || selectedObject.uuid);
                }
            }
        }
    }

    selectedObject = null;
    // Re-enable controls only if camera animation AND yRotation are not active
    if (!cameraAnimationActive && !effectControls.yRotation) {
        controls.enabled = true;
    }
    // isDragging is reset by onPointerDown for the next interaction
}

function onClick(event) {

    // Only process click if no dragging occurred and not clicking on UI
    if (isDragging || event.target.closest('#left-ui-container') || event.target.closest('#right-ui-container') || event.target.closest('#arrow-container') || event.target.closest('#element-controls')) {
        return;
    }

    // Do not process clicks while in mask mode (prevents Z-depth cycling during mask drawing/dragging)
    if (maskMode) return;

    stopCameraAnimationAndReset(); // Only stop FLY camera on explicit click if not dragging and not on UI

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(draggableObjects, true); // Intersect with all descendants

    // Filter intersects to only consider those with alpha > 0.1
    let clickedObject = null;
    for (const intersect of intersects) {
        const object = intersect.object;
        const material = object.material;

        // Special handling for ShaderMaterial with alphaTest, as getAlphaAtUV is for MeshBasicMaterial
        if (material instanceof THREE.ShaderMaterial && material.alphaTest !== undefined && material.alphaTest > 0) {
            clickedObject = object;
            break;
        } else if (material && material.map && material.transparent) {
            const uv = intersect.uv;
            const alpha = getAlphaAtUV(material.map, uv);

            if (alpha > 0.1) { // Alpha threshold for click detection
                clickedObject = object;
                break; // Found a clickable opaque part, stop searching
            }
        }
        else if (material && !material.transparent) {
            // For opaque materials, any intersect means it's clickable
            clickedObject = object;
            break; // Found a clickable opaque part, stop searching
        }
    }

    if (clickedObject) {
        // ── Select element for scale slider ──
        selectElementForControls(clickedObject);

        // ── SWAP MODE: cycle overlord element instead of Z-depth ──
        if (swapMode) {
            const id = clickedObject.userData.id;
            if (CYCLABLE_ELEMENTS.includes(id)) {
                cycleElement(id);
                return; // Don't fall through to Z-depth cycling
            }
            // If not a cyclable element, fall through to normal Z-depth behavior
        }

        // Skip depth cycling for non-draggable elements or those with special handling
        if (clickedObject === backgroundMesh || clickedObject === rightEyeRedactionRect || clickedObject === leftEyeRedactionRect || clickedObject === marqueeTextMesh || clickedObject === biometricMarqueeTextMesh || clickedObject === bloodTextMesh || clickedObject === redactedGlitchTextMesh) { // Added redactedGlitchTextMesh
            return;
        }

        // Cycle through depth levels
        let currentLayer = clickedObject.userData.currentLayer || 1;
        currentLayer--; // Move backward one level
        if (currentLayer < 1) { // If it goes below 1
            currentLayer = totalDepthLayers; // Wrap around to the highest layer
        }
        clickedObject.userData.currentLayer = currentLayer;
        clickedObject.position.z = (currentLayer - 1) * depthStep;

        // Update redaction rectangle Z position if the clicked object is an eye
        if (clickedObject === rightEyeMesh) {
            if (rightEyeRedactionRect) {
                rightEyeRedactionRect.position.z = clickedObject.position.z + (1.5 * depthStep);
            }
        }
        else if (clickedObject === leftEyeMesh) {
            if (leftEyeRedactionRect) {
                leftEyeRedactionRect.position.z = clickedObject.position.z + (1.5 * depthStep);
            }
        }

        console.log(`Object moved to layer: ${currentLayer}, Z-position: ${clickedObject.position.z}`);
    }
}

// Ease-in-out function
function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function startCameraAnimation(currentTime) {
    if (!cameraAnimationActive || cameraAnimationTargets.length === 0) return;

    // Store current camera state as the start for the next animation segment
    cameraPreviousPos.copy(camera.position);
    cameraPreviousLookAt.copy(controls.target);
    cameraAnimationStartTime = currentTime;

    let duration = 0;
    if (cameraAnimationState === 'exploring') {
        duration = cameraExplorationDuration;
    }
    else if (cameraAnimationState === 'returningToGlobalStart') {
        duration = cameraReturnDuration;
    }

    if (cameraAnimationState === 'returningToGlobalStart' || assetsVisitedCount >= ASSETS_PER_GLOBAL_RETURN) {
        cameraAnimationState = 'exploring';
        assetsVisitedCount = 0;

        // Pick a random target for the next exploration
        let newTarget;
        do {
            newTarget = cameraAnimationTargets[Math.floor(Math.random() * cameraAnimationTargets.length)];
        } while (newTarget === cameraTargetObject && cameraAnimationTargets.length > 1);
        cameraTargetObject = newTarget;

        // Calculate end position and lookAt based on the target object
        const targetPos = cameraTargetObject.position;
        const targetBounds = new THREE.Box3().setFromObject(cameraTargetObject);
        const center = targetBounds.getCenter(new THREE.Vector3());
        const size = targetBounds.getSize(new THREE.Vector3());

        const fovRad = THREE.MathUtils.degToRad(camera.fov);
        const baseDistance = Math.max(size.x, size.y) / (2 * Math.tan(fovRad / 2));

        const minZOffset = baseDistance * 0.8;
        const maxZOffset = baseDistance * 1.5;
        const randomZOffset = minZOffset + (Math.random() * (maxZOffset - minZOffset));

        const lateralOffsetRange = baseDistance * 0.5;
        const randomOffsetX = (Math.random() - 0.5) * lateralOffsetRange;
        const randomOffsetY = (Math.random() - 0.5) * lateralOffsetRange;

        cameraCurrentTargetPos.set(
            center.x + randomOffsetX,
            center.y + randomOffsetY,
            targetPos.z + randomZOffset
        );

        cameraCurrentTargetLookAt.copy(center);

        cameraCurrentTargetPos.z = THREE.MathUtils.clamp(cameraCurrentTargetPos.z, -5, 15);

    } else { // Continue exploring
        cameraAnimationState = 'exploring';
        assetsVisitedCount++;

        // Pick a random target, ensuring it's not the same as the previous one if possible
        let newTarget;
        do {
            newTarget = cameraAnimationTargets[Math.floor(Math.random() * cameraAnimationTargets.length)];
        } while (newTarget === cameraTargetObject && cameraAnimationTargets.length > 1);
        cameraTargetObject = newTarget;

        // Calculate end position and lookAt based on the target object
        const targetPos = cameraTargetObject.position;
        const targetBounds = new THREE.Box3().setFromObject(cameraTargetObject);
        const center = targetBounds.getCenter(new THREE.Vector3());
        const size = targetBounds.getSize(new THREE.Vector3());

        // Determine a suitable base distance to frame the object based on its size and camera FOV
        const fovRad = THREE.MathUtils.degToRad(camera.fov);
        const baseDistance = Math.max(size.x, size.y) / (2 * Math.tan(fovRad / 2));

        // Introduce randomness to the Z-distance from the target object
        const minZOffset = baseDistance * 0.8;
        const maxZOffset = baseDistance * 1.5;
        const randomZOffset = minZOffset + (Math.random() * (maxZOffset - minZOffset));

        // Set a random offset around the target object for camera position in X and Y
        const lateralOffsetRange = baseDistance * 0.5;
        const randomOffsetX = (Math.random() - 0.5) * lateralOffsetRange;
        const randomOffsetY = (Math.random() - 0.5) * lateralOffsetRange;

        cameraCurrentTargetPos.set(
            center.x + randomOffsetX,
            center.y + randomOffsetY,
            targetPos.z + randomZOffset
        );

        cameraCurrentTargetLookAt.copy(center);

        // Clamp cameraCurrentTargetPos.z to be within reasonable bounds for the scene
        cameraCurrentTargetPos.z = THREE.MathUtils.clamp(cameraCurrentTargetPos.z, -5, 15);
    }
}

function updateCameraAnimation(currentTime) {
    if (cameraAnimationState === 'idle' || !cameraAnimationActive) return;

    const elapsed = currentTime - cameraAnimationStartTime;

    let duration = 0;
    if (cameraAnimationState === 'exploring') {
        duration = cameraExplorationDuration;
    }
    else if (cameraAnimationState === 'returningToGlobalStart') {
        duration = cameraReturnDuration;
    }

    let t = Math.min(1, elapsed / duration);
    t = easeInOutCubic(t);

    camera.position.lerpVectors(cameraPreviousPos, cameraCurrentTargetPos, t);
    controls.target.lerpVectors(cameraPreviousLookAt, cameraCurrentTargetLookAt, t);

    if (elapsed >= duration) {
        // If returning to global start, then after completion, start a new exploration cycle
        if (cameraAnimationState === 'returningToGlobalStart') {
            cameraAnimationState = 'exploring';
            assetsVisitedCount = 0;
        }
        startCameraAnimation(currentTime);
    }
    camera.lookAt(controls.target);
}

function animate(currentTime) {
    requestAnimationFrame(animate);

    // Apply Y-rotation if explicitly enabled
    if (effectControls.yRotation) {
        // Ensure camera animation is turned off if Y-rotation is active
        if (cameraAnimationActive) {
            cameraAnimationActive = false;
            updateUIButtonState('cameraAnimation', false);
        }
        controls.enabled = false;
        const convergencePoint = new THREE.Vector3(0, 0, (1 - 1) * depthStep);
        camera.position.x = yBounceInitialCameraX + yBounceRangeX * Math.sin(currentTime * yBounceSpeed);
        camera.position.y = yBounceInitialCameraY;
        camera.position.z = yBounceInitialCameraZ;
        camera.lookAt(convergencePoint);
    }

    // Apply Camera Animation if explicitly enabled
    if (cameraAnimationActive) {
        // Ensure Y-rotation is turned off if camera animation is active
        if (effectControls.yRotation) {
            effectControls.yRotation = false;
            updateUIButtonState('yRotation', false);
        }
        controls.enabled = false;
        updateCameraAnimation(currentTime);
    } else if (!effectControls.yRotation) {
        controls.update();
    }
    
    // --- Background Color Management (repeated in animate loop for persistent check) ---
    const needsBlackBackground = effectControls.shadow || effectControls.threshold || effectControls.anon || effectControls.matrix || effectControls.ascii || effectControls.og;
    
    // If REDACTED GLITCH is active, use the orange background
    if (effectControls.redactedGlitch) {
        renderer.setClearColor(0xFFAC1C); // Orange
    } else if (needsBlackBackground) {
        renderer.setClearColor(0x000000); // Black
    } else {
        renderer.setClearColor(0x1e1e1e); // Default dark gray
    }
    // --- End Background Color Management ---

    // Update the time uniform for the CCTVFeedShader
    if (cctvFeedPass.enabled) {
        cctvFeedPass.uniforms['time'].value = currentTime * 0.001;
    }

    // Update marquee text scrolling
    if (effectControls.xray) { // Marquee text is now only tied to XRAY effect
        marqueeScrollOffset -= MARQUEE_SCROLL_SPEED;
        // Reset offset when one full set of lines has scrolled off
        if (marqueeScrollOffset <= -MARQUEE_LINE_HEIGHT * MARQUEE_TOTAL_LINES) {
            marqueeScrollOffset = 0;
        }
        updateMarqueeTexture();
    }

    // Update biometric marquee text scrolling
    if (effectControls.biometricMarquee || effectControls.og || effectControls.hacker || effectControls.surveillance || effectControls.greed) { // Update if either biometric or OG or HACKER or SURVEILLANCE or GREED is active
        biometricMarqueeScrollOffset -= BIOMETRIC_MARQUEE_SCROLL_SPEED;
        if (biometricMarqueeScrollOffset <= -BIOMETRIC_MARQUEE_LINE_HEIGHT * BIOMETRIC_MARQUEE_TOTAL_LINES) {
            biometricMarqueeScrollOffset = 0;
        }
        updateBiometricMarqueeTexture(currentTime);
    }

    // Update blood text scrolling
    if (effectControls.bloodText) {
        bloodScrollOffset -= BLOOD_TEXT_SCROLL_SPEED;
        const singleSetHeight = BLOOD_TEXT_LINE_HEIGHT * BLOOD_TEXT_TOTAL_LINES;

        // When the first set of phrases has scrolled completely off the top of the canvas,
        // wrap it around to the bottom, effectively creating a continuous loop.
        if (bloodScrollOffset <= -singleSetHeight) {
            bloodScrollOffset += singleSetHeight * 3; // Move it to the bottom of the second set
            shuffledBloodPhrases = shuffleArray([...BLOOD_TEXT_PHRASES]); // Reshuffle phrases on loop
        }

        updateBloodTextTexture();
    }

    // Update redacted glitch text scrolling
    if (effectControls.redactedGlitch) {
        redactedGlitchScrollOffset -= REDACTED_GLITCH_SCROLL_SPEED;
        const singleSetHeight = REDACTED_GLITCH_LINE_HEIGHT * REDACTED_GLITCH_TOTAL_LINES;
        if (redactedGlitchScrollOffset <= -singleSetHeight) {
            redactedGlitchScrollOffset = 0;
            // Re-initialize redaction patterns when the text loops
            initializeRedactedGlitchPhraseData();
        }
        updateRedactedGlitchTexture();
    }

    composer.render();
}

// ERC-721 minimal ABI for balanceOf
const ERC721_BALANCE_ABI = [
    'function balanceOf(address owner) view returns (uint256)'
];

async function connectWallet() {
    if (!window.ethereum) {
        alert('No Ethereum wallet detected. Please install MetaMask or another Web3 wallet.');
        return null;
    }
    try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send('eth_requestAccounts', []);
        connectedWalletAddress = accounts[0];
        console.log('Wallet connected:', connectedWalletAddress);
        return provider;
    } catch (err) {
        console.error('Wallet connection failed:', err);
        return null;
    }
}

async function checkContractBalance(provider, contractAddress) {
    try {
        const contract = new ethers.Contract(contractAddress, ERC721_BALANCE_ABI, provider);
        const balance = await contract.balanceOf(connectedWalletAddress);
        return balance > 0n;
    } catch (err) {
        console.error('Contract balance check failed for', contractAddress, err);
        return false;
    }
}

function loadContractGatedLayer(assetConfig) {
    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin('');
    const baseScale = 0.005;

    const loadTexture = (url, callback) => {
        textureLoader.load(url, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = false;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            callback(texture);
        }, undefined, (error) => {
            console.error('Error loading contract-gated texture:', url, error);
        });
    };

    loadTexture(assetConfig.imageUrl, (texture) => {
        const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide,
            alphaTest: 0.5
        });
        const scaleFactor = assetConfig.scale || 1.0;
        const planeWidth = texture.image.width * baseScale * scaleFactor;
        const planeHeight = texture.image.height * baseScale * scaleFactor;
        const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
        const mesh = new THREE.Mesh(geometry, material);

        const pos = assetConfig.position || { x: 0, y: 0, z: (assetConfig.layer || 8) * depthStep };
        mesh.position.set(pos.x, pos.y, pos.z);
        mesh.userData.currentLayer = assetConfig.layer || 8;
        mesh.userData.initialPosition = mesh.position.clone();
        mesh.userData.initialLayer = mesh.userData.currentLayer;
        mesh.userData.id = 'gated_' + assetConfig.contract.slice(0, 8);
        mesh.userData.initialScale = { width: planeWidth, height: planeHeight };
        mesh.userData.contractGated = true;

        // Fade in
        material.opacity = 0;
        scene.add(mesh);
        draggableObjects.push(mesh);
        cameraAnimationTargets.push(mesh);
        contractGatedMeshes.push(mesh);

        // Store config for save/restore
        initialAssetConfigs.push({
            id: mesh.userData.id,
            type: 'image',
            url: assetConfig.imageUrl,
            initialPosition: mesh.position.clone(),
            initialLayer: mesh.userData.currentLayer,
            baseScale: baseScale,
            scaleFactor: scaleFactor,
            removed: false,
            contractGated: true
        });

        // Animate fade in
        const fadeIn = () => {
            if (material.opacity < 1) {
                material.opacity = Math.min(material.opacity + 0.05, 1);
                requestAnimationFrame(fadeIn);
            }
        };
        fadeIn();

        console.log(`Contract-gated asset loaded: ${assetConfig.label || assetConfig.imageUrl}`);
    });
}

async function connectAndCheckAssets() {
    const walletBtn = document.getElementById('wallet-connect-btn');

    if (connectedWalletAddress) {
        // Already connected — re-check
        walletBtn.textContent = 'CHECKING...';
    } else {
        walletBtn.textContent = 'CONNECTING...';
    }

    const provider = connectedWalletAddress
        ? new ethers.BrowserProvider(window.ethereum)
        : await connectWallet();

    if (!provider || !connectedWalletAddress) {
        walletBtn.textContent = 'CONNECT WALLET';
        return;
    }

    // Update button to show connected state
    const shortAddr = connectedWalletAddress.slice(0, 6) + '...' + connectedWalletAddress.slice(-4);
    walletBtn.textContent = shortAddr;
    walletBtn.style.borderColor = '#4c4';
    walletBtn.style.color = '#4c4';

    if (CONTRACT_GATED_ASSETS.length === 0) {
        console.log('No contract-gated assets configured.');
        return;
    }

    // Remove any previously loaded contract-gated meshes (in case of re-check)
    contractGatedMeshes.forEach(mesh => {
        scene.remove(mesh);
        const idx = draggableObjects.indexOf(mesh);
        if (idx !== -1) draggableObjects.splice(idx, 1);
        const camIdx = cameraAnimationTargets.indexOf(mesh);
        if (camIdx !== -1) cameraAnimationTargets.splice(camIdx, 1);
    });
    contractGatedMeshes = [];

    // Check each contract and load qualifying assets
    let unlocked = 0;
    for (const asset of CONTRACT_GATED_ASSETS) {
        const holds = await checkContractBalance(provider, asset.contract);
        if (holds) {
            loadContractGatedLayer(asset);
            unlocked++;
            console.log(`UNLOCKED: ${asset.label || asset.contract}`);
        } else {
            console.log(`LOCKED: ${asset.label || asset.contract} — wallet does not hold tokens`);
        }
    }

    if (unlocked > 0) {
        walletBtn.textContent = `${shortAddr} (${unlocked} UNLOCKED)`;
    }
}

  <script>
  (function(){
    // ── Detect if embedded in iframe ──
    const isEmbedded = (window.self !== window.top);

    // ── PRINT BUTTON + MODAL (wired immediately, no dependency on export toggle) ──
    const printBtn = document.getElementById('print-btn');
    const printOverlay = document.getElementById('print-modal-overlay');
    const printEmailInput = document.getElementById('print-email-input');
    const printSubmitBtn = document.getElementById('print-submit-btn');
    const printStatus = document.getElementById('print-status');

    if (isEmbedded) {
      // Hide everything when embedded in an iframe
      if (printBtn) printBtn.style.display = 'none';
      const exportWrapper = document.getElementById('export-wrapper');
      if (exportWrapper) exportWrapper.style.display = 'none';
      const eyeIndicator = document.getElementById('eye-indicator');
      if (eyeIndicator) eyeIndicator.style.display = 'none';
      const swapModeBtn = document.getElementById('swap-mode-btn');
      if (swapModeBtn) swapModeBtn.style.display = 'none';
      const swapModeBtnLeft = document.getElementById('swap-mode-btn-left');
      if (swapModeBtnLeft) swapModeBtnLeft.style.display = 'none';
      const elementControls = document.getElementById('element-controls');
      if (elementControls) elementControls.style.display = 'none';
    }

    if (printBtn && printOverlay && !isEmbedded) {
      printBtn.onclick = (e) => {
        e.stopPropagation();
        printOverlay.classList.add('open');
        printEmailInput.value = '';
        printStatus.textContent = '';
        printSubmitBtn.disabled = false;
      };

      // Close on overlay background click
      printOverlay.onclick = (e) => {
        if (e.target === printOverlay) printOverlay.classList.remove('open');
      };

      // ── PRINT SUBMIT — capture canvas + composition JSON, send to Airtable ──
      printSubmitBtn.onclick = async () => {
        const email = printEmailInput.value.trim();
        if (!email || !email.includes('@')) {
          printStatus.style.color = '#e66';
          printStatus.textContent = 'Please enter a valid email address';
          return;
        }

        printSubmitBtn.disabled = true;
        printStatus.style.color = '#aaa';
        printStatus.textContent = 'CAPTURING...';

        try {
          // Wait for renderer to be available
          const r = await waitForRenderer();
          if (window.composer) { window.composer.render(); }
          else if (window.scene && window.camera) { r.render(window.scene, window.camera); }
          const dataUrl = r.domElement.toDataURL('image/png');
          const imageBlob = await (await fetch(dataUrl)).blob();

          // Build composition JSON
          const meshStates = [];
          if (window.scene) {
            window.scene.children.forEach(child => {
              if (child.userData && child.userData.id) {
                meshStates.push({
                  id: child.userData.id,
                  position: { x: child.position.x, y: child.position.y, z: child.position.z },
                  rotation: { x: child.rotation.x, y: child.rotation.y, z: child.rotation.z },
                  scale: { x: child.scale.x, y: child.scale.y, z: child.scale.z },
                  visible: child.visible,
                  userScale: child.userData.userScale || 1.0,
                });
              }
            });
          }
          const compositionJson = JSON.stringify({ meshes: meshStates, timestamp: new Date().toISOString() });

          printStatus.textContent = 'UPLOADING...';

          const form = new FormData();
          form.append('email', email);
          form.append('image', imageBlob, 'print-capture.png');
          form.append('compositionJson', compositionJson);

          const API_URL = window.location.origin;
          const res = await fetch(API_URL + '/api/print-order', { method: 'POST', body: form });

          if (!res.ok) {
            const errBody = await res.json().catch(() => ({}));
            throw new Error(errBody.error || 'Submission failed');
          }
          const data = await res.json();

          if (data.ok) {
            printStatus.style.color = '#4c4';
            printStatus.textContent = 'SUBMITTED — CHECK YOUR EMAIL';
            setTimeout(() => {
              printOverlay.classList.remove('open');
              printStatus.textContent = '';
              printSubmitBtn.disabled = false;
            }, 3000);
          } else {
            throw new Error(data.error || 'Unknown error');
          }
        } catch (e) {
          printStatus.style.color = '#e66';
          printStatus.textContent = e.message || 'NETWORK ERROR — TRY AGAIN';
          printSubmitBtn.disabled = false;
        }
      };
    } // end print button setup

    // Helper: wait for window.renderer
    function waitForRenderer() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.renderer && window.renderer.domElement) resolve(window.renderer);
          else setTimeout(check, 100);
        };
        check();
      });
    }

    // ── EXPORT PANEL SETUP (waits for export-panel to exist) ──
    function setupExport() {
    const panel = document.getElementById('export-panel');
    if (!panel) { setTimeout(setupExport, 50); return; }

    const fmtSel    = document.getElementById('export-format');
    const durInput  = document.getElementById('export-duration');
    const startBtn  = document.getElementById('export-start-btn');
    const status    = document.getElementById('export-status');

    const exportWrapper = document.getElementById('export-wrapper');

    // Close export panel on outside click
    document.addEventListener('click', (e) => {
      if (startBtn.classList.contains('recording')) return;

    });

    // ── Format is PNG-only, duration row stays hidden ──
    fmtSel.onchange = () => {
      durRow.style.display = 'none';
    };

    // ── Helpers ──
    function setStatus(msg, cls) {
      status.textContent = msg;
      status.className = 'status-line' + (cls ? ' ' + cls : '');
    }
    function lockUI(on) {
      startBtn.disabled = on;
      fmtSel.disabled   = on;
      durInput.disabled  = on;
    }
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href    = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    // Wait for window.renderer to be available (exposed after 1 s by the app)
    function getRenderer() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.renderer && window.renderer.domElement) resolve(window.renderer);
          else setTimeout(check, 100);
        };
        check();
      });
    }

    // ── Gallery API endpoint (update after deploying your Cloudflare Worker) ──
    const GALLERY_API = window.GALLERY_API_URL || '';

    // ── Save to community gallery via Cloudflare R2 ──
    function saveToGallery(canvas) {
      if (!GALLERY_API) {
        console.warn('Gallery API not configured — set window.GALLERY_API_URL');
        return;
      }
      try {
        const thumbCanvas = document.createElement('canvas');
        const MAX = 1200;
        const scale = Math.min(MAX / canvas.width, MAX / canvas.height, 1);
        thumbCanvas.width = Math.round(canvas.width * scale);
        thumbCanvas.height = Math.round(canvas.height * scale);
        const ctx = thumbCanvas.getContext('2d');
        ctx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);

        thumbCanvas.toBlob(async (blob) => {
          if (!blob) return;
          const form = new FormData();
          form.append('image', blob, 'export.jpg');
          form.append('overlord', 'combined');
          try {
            const res = await fetch(GALLERY_API + '/upload', { method: 'POST', body: form });
            if (!res.ok) console.warn('Gallery upload response:', res.status);
          } catch (e) {
            console.warn('Gallery upload failed:', e);
          }
        }, 'image/jpeg', 0.85);
      } catch (e) {
        console.warn('Gallery save failed:', e);
      }
    }

    // ── PNG export ──
    async function exportPNG() {
      setStatus('Capturing…', 'active');
      lockUI(true);
      const r = await getRenderer();
      // Force a fresh render so the buffer has the current frame
      if (window.composer) {
        window.composer.render();
      } else if (window.scene && window.camera) {
        r.render(window.scene, window.camera);
      }
      r.domElement.toBlob((blob) => {
        if (blob) {
          triggerDownload(blob, 'combined-coldie.png');
          saveToGallery(r.domElement);
          setStatus('PNG saved ✓ — added to gallery', 'active');
          // Post-export modal removed
        } else {
          setStatus('Capture failed', 'error');
        }
        lockUI(false);
      }, 'image/png');
    }
    // ── Video (MP4) export ──────────────────────────────────────────
    // Strategy: try native H.264 MP4 first (Safari, newer Chrome).
    // If unavailable, record VP9/VP8 WebM and re-mux into an MP4 container
    // so the .mp4 extension and container are always correct for Twitter/X.
    async function exportVideo() {
      const duration = parseInt(durInput.value) * 1000; // ms

      const r = await getRenderer();
      const canvas = r.domElement;
      const stream = canvas.captureStream(30);

      // Codec priority: H.264 MP4 first, then WebM fallbacks
      const candidates = [
        'video/mp4;codecs=avc1.42E01E',
        'video/mp4;codecs=avc1.640028',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      let usedMime = '';
      for (const m of candidates) {
        if (MediaRecorder.isTypeSupported(m)) { usedMime = m; break; }
      }
      if (!usedMime) { setStatus('No supported codec found', 'error'); return; }

      const nativeMp4 = usedMime.startsWith('video/mp4');

      const chunks = [];
      const mr = new MediaRecorder(stream, { mimeType: usedMime, videoBitsPerSecond: 2500000 });

      lockUI(true);
      startBtn.classList.add('recording');
      setStatus(`Recording… ${duration/1000}s`, 'active');

      mr.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

      mr.onstop = async () => {
        try {
          if (nativeMp4) {
            // Browser produced a native MP4 – download directly
            const blob = new Blob(chunks, { type: 'video/mp4' });
            triggerDownload(blob, 'combined-coldie.mp4');
            setStatus(`MP4 saved ✓  (${(blob.size/1024/1024).toFixed(2)} MB)`, 'active');
            // Post-export modal removed
          } else {
            // Recorded WebM – wrap it inside an MP4 container
            setStatus('Muxing to MP4…', 'active');
            // Merge all chunks into one Uint8Array
            const arrays = [];
            for (const c of chunks) {
              const buf = await c.arrayBuffer();
              arrays.push(new Uint8Array(buf));
            }
            let totalLen = 0;
            for (const a of arrays) totalLen += a.length;
            const payload = new Uint8Array(totalLen);
            let off = 0;
            for (const a of arrays) { payload.set(a, off); off += a.length; }

            // Build a minimal but valid fragmented MP4 shell
            const mp4 = buildMP4(payload, duration, canvas.width, canvas.height);
            const blob = new Blob([mp4], { type: 'video/mp4' });
            triggerDownload(blob, 'combined-coldie.mp4');
            setStatus(`MP4 saved ✓  (${(blob.size/1024/1024).toFixed(2)} MB)`, 'active');
            // Post-export modal removed
          }
        } catch (err) {
          // Ultimate fallback: save raw recording as-is
          console.error('MP4 mux error', err);
          const ext  = nativeMp4 ? 'mp4' : 'webm';
          const blob = new Blob(chunks, { type: usedMime });
          triggerDownload(blob, `combined-coldie.${ext}`);
          setStatus(`Saved as .${ext} (mux failed)`, 'active');
        }
        lockUI(false);
        startBtn.classList.remove('recording');
      };

      mr.onerror = () => {
        setStatus('Recording failed', 'error');
        lockUI(false);
        startBtn.classList.remove('recording');
      };

      // Save a gallery thumbnail from the first frame
      saveToGallery(canvas);

      mr.start(100); // flush data every 100 ms
      setTimeout(() => {
        mr.stop();
        stream.getTracks().forEach(t => t.stop());
      }, duration);
    }

    // ── Minimal fragmented-MP4 builder ──────────────────────────────
    // Produces ftyp + moov + mdat.  The mdat is the raw recorded bitstream;
    // the moov declares a single video track with no sample table entries
    // (valid for fragmented MP4).  Twitter's transcoder probes the actual
    // codec inside mdat, so this works whether the inner data is H.264 or VP9.
    function buildMP4(payload, durationMs, width, height) {
      // Helpers
      function u32(v) { return [(v>>>24)&0xFF,(v>>>16)&0xFF,(v>>>8)&0xFF,v&0xFF]; }
      function u16(v) { return [(v>>>8)&0xFF, v&0xFF]; }
      function tag(s) { return s.split('').map(c => c.charCodeAt(0)); }

      function box(type, body) {
        const size = 8 + body.length;
        return new Uint8Array([...u32(size), ...tag(type), ...body]);
      }
      function fullBox(type, version, flags, body) {
        const vf = u32((version << 24) | flags);
        return box(type, new Uint8Array([...vf, ...body]));
      }
      function concat(...parts) {
        let len = 0; for (const p of parts) len += p.length;
        const out = new Uint8Array(len);
        let o = 0; for (const p of parts) { out.set(p, o); o += p.length; }
        return out;
      }

      const ts = 1000; // timescale
      const dur = durationMs;

      // ── ftyp ──
      const ftyp = box('ftyp', new Uint8Array([
        ...tag('isom'), ...u32(512),           // major brand + minor version
        ...tag('isom'), ...tag('iso2'), ...tag('mp41') // compatible brands
      ]));

      // ── moov ──
      const mvhd = fullBox('mvhd', 0, 0, new Uint8Array([
        ...u32(0), ...u32(0),        // created / modified
        ...u32(ts), ...u32(dur),     // timescale / duration
        ...u32(0x00010000),          // rate = 1.0
        ...u16(0x0100),              // volume = 1.0
        ...new Uint8Array(10),       // reserved
        // identity matrix
        ...u32(0x00010000),...u32(0),...u32(0),
        ...u32(0),...u32(0x00010000),...u32(0),
        ...u32(0),...u32(0),...u32(0x40000000),
        ...new Uint8Array(24),       // pre_defined
        ...u32(2)                    // next_track_ID
      ]));

      const tkhd = fullBox('tkhd', 0, 3, new Uint8Array([
        ...u32(0), ...u32(0),        // created / modified
        ...u32(1),                   // track_ID
        ...u32(0),                   // reserved
        ...u32(dur),                 // duration
        ...new Uint8Array(8),        // reserved
        ...u16(0), ...u16(0),        // layer / alternate_group
        ...u16(0), ...u16(0),        // volume / reserved
        // identity matrix
        ...u32(0x00010000),...u32(0),...u32(0),
        ...u32(0),...u32(0x00010000),...u32(0),
        ...u32(0),...u32(0),...u32(0x40000000),
        ...u32(width << 16),         // width  16.16
        ...u32(height << 16)         // height 16.16
      ]));

      const mdhd = fullBox('mdhd', 0, 0, new Uint8Array([
        ...u32(0), ...u32(0),
        ...u32(ts), ...u32(dur),
        ...u16(0x55C4),              // language 'und'
        ...u16(0)
      ]));

      const hdlr = fullBox('hdlr', 0, 0, new Uint8Array([
        ...u32(0),                   // pre_defined
        ...tag('vide'),              // handler_type
        ...new Uint8Array(12),       // reserved
        0                            // name (null terminator)
      ]));

      // stsd – one generic visual sample entry
      const sampleEntry = (() => {
        const inner = new Uint8Array([
          0,0, 0,0,0,1,             // reserved(6) + data_ref_index = 1
          ...new Uint8Array(16),     // pre_defined + reserved
          ...u16(width), ...u16(height),
          0x00,0x48,0x00,0x00,      // horiz res 72 dpi
          0x00,0x48,0x00,0x00,      // vert  res 72 dpi
          0,0,0,0,                  // reserved
          0,0,0,1,                  // frame_count
          ...new Uint8Array(32),     // compressor_name
          0,0,0x01,0x18,            // depth
          0xFF,0xFF                 // pre_defined
        ]);
        return box('mp41', inner);   // 'mp41' = generic visual
      })();

      const stsd = fullBox('stsd', 0, 0, new Uint8Array([...u32(1), ...sampleEntry]));
      const stts = fullBox('stts', 0, 0, new Uint8Array([...u32(0)]));
      const stsc = fullBox('stsc', 0, 0, new Uint8Array([...u32(0)]));
      const stsz = fullBox('stsz', 0, 0, new Uint8Array([...u32(0), ...u32(0)]));
      const stco = fullBox('stco', 0, 0, new Uint8Array([...u32(0)]));
      const stbl = box('stbl', concat(stsd, stts, stsc, stsz, stco));

      const vmhd = fullBox('vmhd', 0, 1, new Uint8Array([
        ...u16(0), ...u16(0), ...u16(0), ...u16(0) // graphicsmode + opcolor
      ]));
      const dref  = fullBox('dref', 0, 0, new Uint8Array([...u32(1), ...fullBox('url ', 0, 1, new Uint8Array(0))]));
      const dinf  = box('dinf', dref);
      const minf  = box('minf', concat(vmhd, dinf, stbl));
      const mdia  = box('mdia', concat(mdhd, hdlr, minf));
      const trak  = box('trak', concat(tkhd, mdia));

      // mvex (mandatory for fragmented MP4)
      const trex = fullBox('trex', 0, 0, new Uint8Array([
        ...u32(1), ...u32(1), ...u32(0), ...u32(0), ...u32(0)
      ]));
      const mvex = box('mvex', trex);
      const moov = box('moov', concat(mvhd, trak, mvex));

      // ── mdat ──
      const mdatSize = 8 + payload.length;
      const mdat = new Uint8Array([...u32(mdatSize), ...tag('mdat'), ...payload]);

      return concat(ftyp, moov, mdat);
    }

    // ── Main dispatcher ──
    startBtn.onclick = () => {
      const f = fmtSel.value;
      if      (f === 'png') exportPNG();
      else if (f === 'mp4') exportVideo();
    };
    } // end setupExport
    setupExport();
  })();
  </script>

</body></html>
